<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 400" width="280" height="400">
  <defs>
    <linearGradient id="floral-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbcfe8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Dress body -->
  <path d="M80,10 Q140,-5 200,10 L220,80 L250,395 L30,395 L60,80 Z"
    fill="url(#floral-grad)" stroke="#ec4899" stroke-width="2"/>
  <!-- Neckline -->
  <path d="M95,10 Q140,32 185,10" fill="none" stroke="#db2777" stroke-width="2"/>
  <!-- Waist sash -->
  <rect x="60" y="140" width="160" height="20" rx="4" fill="#f9a8d4" stroke="#ec4899" stroke-width="1.5"/>
  <!-- Flowers -->
  <g transform="translate(100,60)">
    <circle cx="0" cy="0" r="8" fill="#f472b6"/>
    <circle cx="12" cy="-6" r="5" fill="#fb7185"/>
    <circle cx="-10" cy="-4" r="5" fill="#f9a8d4"/>
    <circle cx="0" cy="0" r="3" fill="#fbbf24"/>
  </g>
  <g transform="translate(170,90)">
    <circle cx="0" cy="0" r="7" fill="#ec4899"/>
    <circle cx="10" cy="-5" r="4" fill="#f472b6"/>
    <circle cx="-8" cy="-3" r="4" fill="#fda4af"/>
    <circle cx="0" cy="0" r="2.5" fill="#fbbf24"/>
  </g>
  <g transform="translate(90,210)">
    <circle cx="0" cy="0" r="9" fill="#f9a8d4"/>
    <circle cx="13" cy="-7" r="5" fill="#f472b6"/>
    <circle cx="-11" cy="-5" r="5" fill="#fda4af"/>
    <circle cx="0" cy="0" r="3" fill="#fbbf24"/>
  </g>
  <g transform="translate(175,180)">
    <circle cx="0" cy="0" r="7" fill="#f472b6"/>
    <circle cx="10" cy="-5" r="4" fill="#ec4899"/>
    <circle cx="-8" cy="-4" r="4" fill="#fda4af"/>
    <circle cx="0" cy="0" r="2.5" fill="#fbbf24"/>
  </g>
  <g transform="translate(130,290)">
    <circle cx="0" cy="0" r="8" fill="#ec4899"/>
    <circle cx="12" cy="-6" r="5" fill="#f472b6"/>
    <circle cx="-10" cy="-4" r="5" fill="#fda4af"/>
    <circle cx="0" cy="0" r="3" fill="#fbbf24"/>
  </g>
  <!-- Leaves -->
  <ellipse cx="115" cy="75" rx="8" ry="4" fill="#86efac" transform="rotate(-30 115 75)"/>
  <ellipse cx="185" cy="100" rx="7" ry="3.5" fill="#86efac" transform="rotate(20 185 100)"/>
  <ellipse cx="105" cy="215" rx="8" ry="4" fill="#86efac" transform="rotate(-25 105 215)"/>
  <!-- Straps -->
  <rect x="108" y="5" width="16" height="35" rx="5" fill="#f9a8d4" stroke="#ec4899" stroke-width="1.5"/>
  <rect x="156" y="5" width="16" height="35" rx="5" fill="#f9a8d4" stroke="#ec4899" stroke-width="1.5"/>
</svg>
