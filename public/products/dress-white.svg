<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 380" width="280" height="380">
  <defs>
    <linearGradient id="dress-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Dress body -->
  <path d="M90,5 Q140,-2 190,5 L210,70 L230,370 L50,370 L70,70 Z"
    fill="url(#dress-grad)" stroke="#cbd5e1" stroke-width="2"/>
  <!-- Neckline -->
  <path d="M100,5 Q140,30 180,5" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <!-- Waist seam -->
  <line x1="70" y1="150" x2="210" y2="150" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Fabric drape lines -->
  <line x1="120" y1="70" x2="90" y2="370" stroke="#e2e8f0" stroke-width="1" opacity="0.8"/>
  <line x1="140" y1="70" x2="140" y2="370" stroke="#e2e8f0" stroke-width="1" opacity="0.8"/>
  <line x1="160" y1="70" x2="190" y2="370" stroke="#e2e8f0" stroke-width="1" opacity="0.8"/>
  <!-- Straps -->
  <rect x="108" y="5" width="18" height="30" rx="5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="154" y="5" width="18" height="30" rx="5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
</svg>
