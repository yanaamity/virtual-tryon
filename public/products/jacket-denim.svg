<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 330" width="300" height="330">
  <defs>
    <linearGradient id="denim-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Jacket body -->
  <path d="M50,50 L95,25 Q110,10 125,8 L150,5 L175,8 Q190,10 205,25 L250,50 L290,95 L255,110 L255,305 L45,305 L45,110 L10,95 Z"
    fill="url(#denim-grad)" stroke="#1e40af" stroke-width="2"/>
  <!-- Collar -->
  <path d="M120,10 L150,35 L180,10" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <!-- Front panel left -->
  <rect x="45" y="50" width="60" height="255" rx="0" fill="#2563eb" opacity="0.4"/>
  <!-- Front panel right -->
  <rect x="195" y="50" width="60" height="255" rx="0" fill="#2563eb" opacity="0.4"/>
  <!-- Center line -->
  <line x1="150" y1="35" x2="150" y2="305" stroke="#1e40af" stroke-width="2.5"/>
  <!-- Button row -->
  <circle cx="150" cy="80" r="5" fill="#1e3a8a"/>
  <circle cx="150" cy="120" r="5" fill="#1e3a8a"/>
  <circle cx="150" cy="160" r="5" fill="#1e3a8a"/>
  <!-- Chest pockets -->
  <rect x="70" y="95" width="45" height="35" rx="4" fill="none" stroke="#1e40af" stroke-width="2"/>
  <rect x="185" y="95" width="45" height="35" rx="4" fill="none" stroke="#1e40af" stroke-width="2"/>
  <!-- Horizontal seams (denim texture) -->
  <line x1="45" y1="185" x2="255" y2="185" stroke="#1e40af" stroke-width="1.5" opacity="0.4"/>
</svg>
