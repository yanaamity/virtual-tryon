<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <linearGradient id="hoodie-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Hood -->
  <path d="M105,10 Q150,-15 195,10 L210,60 Q150,40 90,60 Z" fill="#1f2937" stroke="#111827" stroke-width="2"/>
  <!-- Hoodie body -->
  <path d="M55,55 L95,30 Q105,20 115,15 Q150,5 185,15 Q195,20 205,30 L245,55 L285,100 L250,115 L250,310 L50,310 L50,115 L15,100 Z"
    fill="url(#hoodie-grad)" stroke="#111827" stroke-width="2"/>
  <!-- Kangaroo pocket -->
