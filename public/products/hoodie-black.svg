  <!-- Zipper -->
  <line x1="150" y1="30" x2="150" y2="310" stroke="#4b5563" stroke-width="3" stroke-dasharray="8,5"/>
  <!-- Hood strings -->
  <line x1="130" y1="65" x2="120" y2="130" stroke="#6b7280" stroke-width="2"/>
  <line x1="170" y1="65" x2="180" y2="130" stroke="#6b7280" stroke-width="2"/>
</svg>
