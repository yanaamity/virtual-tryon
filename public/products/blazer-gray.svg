<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350" width="300" height="350">
  <defs>
    <linearGradient id="blazer-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ca3af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b7280;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Blazer body -->
  <path d="M45,55 L90,25 Q110,10 130,8 L150,5 L170,8 Q190,10 210,25 L255,55 L295,100 L258,115 L258,330 L42,330 L42,115 L5,100 Z"
    fill="url(#blazer-grad)" stroke="#4b5563" stroke-width="2"/>
  <!-- Left lapel -->
  <path d="M120,10 L150,50 L90,120 L42,115 L42,60 L90,30 Z" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <!-- Right lapel -->
  <path d="M180,10 L150,50 L210,120 L258,115 L258,60 L210,30 Z" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <!-- Notch collar -->
  <path d="M130,8 L150,30 L170,8" fill="#9ca3af" stroke="#4b5563" stroke-width="2"/>
  <!-- Center button line -->
  <line x1="150" y1="50" x2="150" y2="330" stroke="#4b5563" stroke-width="2"/>
  <!-- Buttons -->
  <circle cx="150" cy="150" r="6" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <circle cx="150" cy="195" r="6" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <circle cx="150" cy="240" r="6" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <!-- Chest pocket -->
  <rect x="80" y="125" width="40" height="8" rx="2" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  <!-- Hip pockets -->
  <path d="M60,230 L70,220 L110,225 L110,260 L60,260 Z" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  <path d="M240,230 L230,220 L190,225 L190,260 L240,260 Z" fill="none" stroke="#4b5563" stroke-width="1.5"/>
</svg>
