<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 330" width="300" height="330">
  <defs>
    <linearGradient id="leather-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27272a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#09090b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leather-shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#52525b;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#18181b;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Jacket body -->
  <path d="M42,60 L88,28 Q108,12 128,9 L150,6 L172,9 Q192,12 212,28 L258,60 L295,102 L260,118 L260,308 L40,308 L40,118 L5,102 Z"
    fill="url(#leather-grad)" stroke="#18181b" stroke-width="2"/>
  <!-- Shine overlay -->
  <path d="M42,60 L88,28 Q108,12 128,9 L150,6 L172,9 L260,118 L210,200 L90,200 Z"
    fill="url(#leather-shine)"/>
  <!-- Left lapel -->
  <path d="M118,11 L150,55 L80,130 L40,118 L40,65 L85,32 Z" fill="#3f3f46" stroke="#18181b" stroke-width="1.5"/>
  <!-- Right lapel -->
  <path d="M182,11 L150,55 L220,130 L260,118 L260,65 L215,32 Z" fill="#3f3f46" stroke="#18181b" stroke-width="1.5"/>
  <!-- Asymmetric zipper -->
  <path d="M150,55 L135,308" stroke="#71717a" stroke-width="3.5" stroke-dasharray="6,4"/>
  <!-- Zip pull -->
  <rect x="132" y="70" width="12" height="8" rx="2" fill="#a1a1aa"/>
  <!-- Zip buckle -->
  <rect x="128" y="65" width="18" height="6" rx="2" fill="#d4d4d8"/>
  <!-- Side buckle straps -->
  <rect x="40" y="240" width="35" height="12" rx="3" fill="#3f3f46" stroke="#71717a" stroke-width="1.5"/>
  <rect x="225" y="240" width="35" height="12" rx="3" fill="#3f3f46" stroke="#71717a" stroke-width="1.5"/>
  <!-- Stitch details -->
  <line x1="60" y1="118" x2="60" y2="308" stroke="#52525b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="240" y1="118" x2="240" y2="308" stroke="#52525b" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Collar -->
  <path d="M128,9 L150,35 L172,9" fill="#27272a" stroke="#18181b" stroke-width="2"/>
  <!-- Wrist zips -->
  <rect x="40" y="285" width="30" height="6" rx="2" fill="#52525b"/>
  <rect x="230" y="285" width="30" height="6" rx="2" fill="#52525b"/>
</svg>
