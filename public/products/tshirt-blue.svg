<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320">
  <defs>
    <linearGradient id="tshirt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- T-Shirt body -->
  <path d="M60,40 L100,20 Q110,10 130,8 Q150,6 170,8 Q190,10 200,20 L240,40 L280,90 L240,105 L240,290 L60,290 L60,105 L20,90 Z"
    fill="url(#tshirt-grad)" stroke="#1e40af" stroke-width="2"/>
  <!-- Collar -->
  <path d="M130,8 Q150,25 170,8" fill="none" stroke="#1e40af" stroke-width="3"/>
  <!-- Sleeve seams -->
  <line x1="60" y1="40" x2="60" y2="105" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>
  <line x1="240" y1="40" x2="240" y2="105" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>
  <!-- Fabric fold lines -->
  <line x1="130" y1="40" x2="125" y2="290" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  <line x1="170" y1="40" x2="175" y2="290" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
</svg>
